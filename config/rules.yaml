# 一、合同事项前置审批核查
pre_audit:
  risk_level: "高风险"
  desc: "需完成立项/采购/投资前置审批，无审批材料不予通过"
  must_keywords: ["立项审批", "采购审批", "投资审批", "前置审批单"]
  check_logic: "合同附件需包含对应审批文件，无则告警"

# 二、合同相对方资质与基础信息核查
party_info:
  risk_level_base: "中风险"
  risk_level_miss: "高风险"
  # 2.1 基础信息
  legal_person_req: ["全称", "注册地址", "法定代表人", "营业执照"]
  natural_person_req: ["姓名", "身份证号码", "常住住址/工作单位"]
  first_coop_file: "加盖公章三证合一营业执照副本"
  # 2.2 从业资质
  industry_qual_keywords: ["经营许可证", "从业资质", "行业许可"]
  # 2.3 关联方
  related_keywords: ["关联方", "关联交易", "关联交易专项审批"]
  # 2.4 代理权限
  agent_keywords: ["授权委托书", "代理权限", "代理人签约"]

# 三、合同标的条款审核
subject:
  risk_level: "中风险"
  must_keywords: ["标的物名称", "规格", "数量", "质量标准", "验收标准", "验收时间", "验收主体", "验收方式"]
  desc: "标的需清晰无模糊表述，完整约定全套验收规则"

# 四、合同生效及履行期限审核
term_check:
  risk_backdate: "高风险"
  risk_auto_renew: "中风险"
  backdate_logic: "合同签订日期晚于履行起始日期即倒签，禁止"
  auto_renew_rule: "原则禁止自动续期；如需设置必须约定我方任意解除权、限价约束"
  special_term_keywords: ["保密期", "服务期", "保修期", "收费期"]

# 五、合同价款与支付条款审核
price_pay:
  risk_level: "中风险"
  must:
    - 大小写金额同时标注
    - 明确价款是否含税
    - 额外支出需我方书面同意
  advance_limit: "预付款尽量不支付，确需支付压缩比例"
  pay_bind: "进度款与阶段性交付成果绑定，先票后款"
  invoice_rule: "按付款节点分批开具等额合规发票"

# 六、保密条款审核
secret_clause:
  risk_level: "高风险"
  standard_text: ["保密示范条款", "保密协议", "个人安全保密承诺书", "中介机构安全保密协议"]
  scene_rule:
    pre_sign_in: "我方接收对方信息：保密协议（接收信息）"
    pre_sign_out: "我方对外提供信息：保密协议（提供信息）"
    formal_contract: "全部对外合同嵌入标准保密条款；中介合同强制加载"
  special_audit: "对方拒绝标准文本需专项审批说明"

# 七、数据保护条款审核
data_clause:
  risk_level: "高风险"
  standard_text: ["数据保护条款", "数据处理协议", "委托处理数据"]
  scene: ["信息委托处理", "对外提供数据", "双方共同处理数据"]
  req: "正文匹配对应条款，相对方单独签署配套数据协议"

# 八、反腐败与反商业贿赂条款审核
anti_bribery:
  risk_level: "高风险"
  mandatory: true
  standard_keywords: ["反腐败", "反商业贿赂", "双反条款"]
  rule: "全系统所有合同必备；无法使用标准文本需签报列明原因"

# 九、双方权利义务条款审核
right_duty:
  risk_level: "中风险"
  req: "权责清晰无失衡，明确变更、解除书面流程，禁止单方随意变更解除"
  keyword: ["合同变更", "合同解除", "书面通知", "双方协商一致"]

# 十、分包与转包限制条款审核
subcontract:
  risk_level: "高风险"
  ban: "信息科技外包禁止整体/变相转包"
  three_constraint:
    1: "核心、主要业务不得分包"
    2: "总包承担全部质量总责，约束分包遵守本合同"
    3: "分包变更需向我方通知/报批"
  keywords: ["转包", "分包", "核心业务不得分包"]

# 十一、履约担保条款审核
performance_guarantee:
  risk_level: "中风险"
  trigger_scene: ["合同金额大", "对方履约能力存疑", "项目高风险"]
  must_content: ["担保形式", "担保范围", "担保有效期", "担保触发机制"]

# 十二、质保金条款审核
quality_deposit:
  risk_level: "中风险"
  req: "约定质保期、质保金，返还规则绑定质保期；明确起算时间、服务范围"
  keywords: ["质保金", "保修期", "质保期起算"]

# 十三、知识产权条款审核
ip_right:
  risk_level: "中风险"
  general_rule: "我方需求产出成果，我方无限制使用，对方不得擅自转让披露"
  custom_software_rule:
    1: "定制软件全部知识产权归我方"
    2: "开发方自有/第三方软件授予我方使用、转许可，交付完整源码文档"
    3: "第三方知识产权由开发方自行取得授权，不限制我方使用"
  keywords: ["知识产权", "源代码", "技术文档", "著作权"]

# 十四、违约责任条款审核
breach:
  risk_level: "中风险"
  must_type:
    - 固定比例违约金
    - 违约金不足弥补损失需补足差额
    - 解除合同全额返还已付款项
    - 我方付款抵扣权
    - 修理/重做/更换/减价等补救措施
  template: "发生XX违约情形，违约方支付合同总价款【】%作为违约金"

# 十五、责任限额条款审核
limit_liability:
  risk_level: "中风险"
  base_rule: "原则不设置责任限额"
  allow_condition: "对方强硬要求、风险可控，沟通业务部门后可设置"
  limit_constraint:
    1: "限额仅适用于违约损失，侵权损失不受限"
    2: 五类情形不适用限额：故意/重大过失/欺诈、侵犯知识产权、违反保密、人身伤亡、法定禁止排除责任

# 十六、通知送达条款审核
notice:
  risk_level: "低风险"
  must: ["通知渠道", "双方送达地址", "联系人电话", "送达认定标准", "地址变更书面告知"]
  default_delivery: "快递为标准通知方式，未告知变更地址则原地址送达有效"

# 十七、适用法律与争议解决条款审核
dispute:
  risk_level: "中风险"
  domestic_rule: "适用中国法律，仲裁/诉讼二选一，不可同时约定"
  foreign_rule: "优先适用中国法律，对方不同意可适用CISG，优先仲裁"
  arbitrate_req: "完整仲裁机构全称、地点、事项、仲裁员规则"
  lawsuit_req: "择我方有利管辖法院，不突破专属/级别管辖"

# 十八、合同附件审核
attachment:
  risk_level: "中风险"
  req: "附件完整齐全，正文与附件同步审核，约定文件解释优先级（后签署文件效力优先）"
  keyword: ["附件", "合同附件", "文件解释顺序"]

# 十九、补充协议审核
supplement:
  risk_level: "中风险"
  rule: "续签/变更/解除补充协议需与原合同衔接，不得冲突，审核需附原合同全文"
  keyword: ["补充协议", "原合同", "合同续签", "合同变更"]

# 二十、合同签章规范审核
seal:
  risk_level: "高风险"
  req:
    1: "法定代表人签字+加盖完整公章"
    2: "授权代表签约需核验授权委托书，授权范围、有效期覆盖签约当日"
    3: "合同签订地统一约定为我方公司所在地"
  keyword: ["公章", "授权委托书", "签订地", "法定代表人"]